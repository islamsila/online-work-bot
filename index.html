<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Work - LinkedIn Style</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="search-container">
        
        <div class="profile-nav" onclick="window.location.href='/m'" title="Profilga o'tish">
            <div class="nav-avatar" id="navAvatar">
                <span id="avatarPlaceholder">👤</span>
            </div>
        </div>

        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Kasb, ko'nikma yoki kalit so'z...">
        </div>
        
        <div class="filter-box">
            <select id="region-select">
                <option value="all">📍 Barcha hududlar</option>
                <option value="Toshkent">Toshkent sh.</option>
                <option value="Toshkent vil.">Toshkent vil.</option>
                <option value="Samarqand">Samarqand</option>
                <option value="Buxoro">Buxoro</option>
                <option value="Andijon">Andijon</option>
                <option value="Farg'ona">Farg'ona</option>
                <option value="Namangan">Namangan</option>
                <option value="Xorazm">Xorazm</option>
                <option value="Navoiy">Navoiy</option>
                <option value="Jizzax">Jizzax</option>
                <option value="Sirdaryo">Sirdaryo</option>
                <option value="Qashqadaryo">Qashqadaryo</option>
                <option value="Surxondaryo">Surxondaryo</option>
                <option value="Qoraqalpog'iston">Qoraqalpog'iston</option>
            </select>
        </div>

        <div class="ai-counter">
            🤖 <span id="vacancy-count">2</span> ta faol vakansiya
        </div>

    </div> 
    
    <div class="main-layout">
        <div class="sidebar-list" id="job-list-container"></div>
        <div class="main-details" id="job-details-container">
            <div class="empty-state">
                <p>Batafsil ma'lumotni ko'rish uchun chap tarafdan biron bir ishni tanlang.</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const jobsData = [
            {
                id: 1,
                title: "Telegram Bot yaratish (aiogram)",
                price: 150,
                location: "Toshkent",
                desc: "Mijoz va frilanserni bog'laydigan mukammal bot yaratish kerak. Tizimda Mini App va foydalanuvchilarni avtomatik tartiblash qismlari bo'lishi shart. Kodlar toza va asinxron yozilishi lozim.",
                client: "Shaxzod Ibrohimov"
            },
            {
                id: 2,
                title: "Flask Backend Dasturchi",
                price: 400,
                location: "Samarqand",
                desc: "Tayyor frontend tizimi uchun ma'lumotlar bazasi (PostgreSQL), Groq AI integratsiyasi hamda API yo'laklarini ishlab chiqish lozim. Ma'lumotlar xavfsizligiga katta e'tibor beriladi.",
                client: "Olimov Tech"
            }
        ];

        let selectedJob = null;

        function renderJobs() {
            const listContainer = document.getElementById('job-list-container');
            listContainer.innerHTML = '';
            
            jobsData.forEach(job => {
                const card = document.createElement('div');
                card.className = `mini-job-card ${selectedJob && selectedJob.id === job.id ? 'active' : ''}`;
                card.onclick = () => selectJob(job);
                
                card.innerHTML = `
                    <div class="mini-title">${job.title}</div>
                    <div class="mini-meta">
                        <span class="m-price">💰 $${job.price}</span>
                        <span class="m-loc">📍 ${job.location}</span>
                    </div>
                `;
                listContainer.appendChild(card);
            });

            document.getElementById('vacancy-count').innerText = jobsData.length;
        }

        function selectJob(job) {
            selectedJob = job;
            renderJobs(); 
            
            const detailsContainer = document.getElementById('job-details-container');
            detailsContainer.innerHTML = `
                <div class="details-header">
                    <h2>${job.title}</h2>
                    <div class="details-badges">
                        <span class="badge b-price">Loyiha budjeti: $${job.price}</span>
                        <span class="badge b-loc">Manzil: ${job.location}</span>
                    </div>
                </div>
                
                <div class="details-body">
                    <h3>📋 Loyiha tavsifi:</h3>
                    <p>${job.desc}</p>
                    
                    <div class="client-info">
                        <strong>👤 Buyurtmachi:</strong> ${job.client}
                    </div>
                </div>
                
                <div class="details-footer">
                    <button class="btn-take-job" onclick="submitApplication(${job.id}, '${job.title}')">
                        🚀 Bu ishni olish 
                    </button>
                </div>
            `;
        }

        function submitApplication(jobId, jobTitle) {
            alert(`Sizning so'rovingiz va PDF rezyumengiz buyurtmachiga yuborildi!`);
            
            if (tg.sendData) {
                tg.sendData(JSON.stringify({
                    action: "take_job",
                    job_id: jobId,
                    title: jobTitle
                }));
            }
        }

        renderJobs();

        function loadNavAvatar() {
            const savedAvatar = localStorage.getItem('userAvatar'); 
            if (savedAvatar) {
                const navAvatar = document.getElementById('navAvatar');
                navAvatar.innerHTML = `<img src="${savedAvatar}" alt="Profile">`;
            }
        }

        loadNavAvatar();
    </script>
</body>
</html>
